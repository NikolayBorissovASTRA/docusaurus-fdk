# Veröffentlicht das Fachhandbuch bei jedem Push auf main automatisch
# auf GitHub Pages. Voraussetzung: Settings → Pages → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Manueller Start über den Actions-Tab (z. B. nach Aktivierung von Pages)
  workflow_dispatch:

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # vollständige Historie für "Zuletzt aktualisiert"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Website bauen
        run: npm run build

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Berechtigungen für das Pages-Deployment
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
